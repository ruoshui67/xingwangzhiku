# CNB 流水线配置
# 注意：镜像构建在本地完成并推送，此处仅配置预览启动
$:
  # -----------------------------------------------------------
  # 预览模式 — 评委启动后即可预览游戏
  # ⚠️ 镜像地址必须使用常量，不能用变量！
  # 用 ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE} 变量
  # 会导致评委 Fork 后解析到评委自己的仓库路径，启动必定失败。
  # -----------------------------------------------------------
  launch:
    - image: docker.cnb.cool/ruoshui67/xingwangzhiku:latest
      port: 80
      name: 兴亡之苦-3D-RPG
      desc: Godot 4 3D 角色扮演游戏《兴亡之苦》
